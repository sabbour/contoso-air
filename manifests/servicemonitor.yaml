apiVersion: azmonitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: contosoair
spec:
  selector:
    matchLabels:
      app: contosoair
  labelLimit: 63
  labelNameLengthLimit: 511
  labelValueLengthLimit: 1023
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
    scheme: http