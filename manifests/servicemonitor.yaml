apiVersion: azmonitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: contosoair
  labels:
    app: contosoair
spec:
  labelLimit: 63
  labelNameLengthLimit: 511
  labelValueLengthLimit: 1023
  namespaceSelector:
    matchNames:
    - contosoair
  selector:
    matchLabels:
      app: contosoair
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
    scheme: http